name: CI

on:
  push:
  pull_request:

jobs:
  go-ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run public harness
        run: go run ./scripts/run_harness --mode public
